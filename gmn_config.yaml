#### Important
##
##   Any ADDITIONAL 'DEFAULT_*'configs added to this file must be also added to gitmynotes.py
##   in the 'USER CONFIGS' section atop that file
##
####


#### User Configs
##
##   REQUIRED TO CHANGE the '<ChangeMe>' github username. 
##   You can create a repo named 'gitmynotes' for max convenience.
##   Make sure your GitHub access/authentication is setup for this repo.  
'DEFAULT_GITHUB_URL': 'https://github.com/<ChangeMe>/gitmynotes'


##   REQUIRED: LEAVE AS-IS or CHANGE--
'DEFAULT_NOTES_FOLDER': 'Notes' # This is the default folder (found on every macOS Notes app) to be processed if --folder not set.
'DEFAULT_NOTES_ACCOUNT': 'iCloud' # macOS Notes account name. 'iCloud' covers most users; use 'On My Mac' or a custom account name as needed. Override per-run with --notes-account.
'DEFAULT_EXPORT_PATH': '~/Documents/gitmynotes'
'DEFAULT_PROCESSED_FOLDER_ENDING': '__GitMyNotes' # ex: if folder is "plans", this will create temp folder "plans__GitMyNotes"
'DEFAULT_NOTES_WRAPPERDIR': 'macosnotes' # this is the dir in Github in which notes folders will be created
'DEFAULT_RESTORE_NOTES': 'empty' # options are "empty, always, never"
'DEFAULT_BATCH_SIZE': 10 # notecount / batchsize = loopcount. 'notecount' is either explicit as 'maxnotes' or returned from get_foldernotecount(folder) if maxnotes not set.
'DEFAULT_LOOPCOUNT_BEFORE_CONFIRM': 5 # loopcount X batchsize = notecount before you must confirm intention to process in one run. This can be over-ridden for use in full automation by adding '--force' to your command.
'PRINT_LEVEL': 'ALL' # Can be 'NONE', 'RESULTS', 'DEBUG', or 'ALL'. CLI '--print' flag overrides this.
'DEFAULT_BODY_FORMAT': 'markdown' # R8: 'markdown' (default) converts each note's HTML body to GitHub-flavored markdown via pandoc and prepends YAML frontmatter (title + creation_date + modification_date). 'html' is the escape hatch -- byte-identical to pre-R8 output (.md file with raw HTML body and the legacy <div>Creation/Modification Date</div> headers). 'markdown' mode requires the 'pandoc' binary on PATH (install via 'brew install pandoc'); GitMyNotes fails fast with a remediation message if pandoc is missing. Flip to 'html' to back up without installing pandoc.

# This is a Work In Progress for users, like me, who have notes which are just a reddit link
# Used with reddit_prefetch.py then reddit_fetch.py to flesh these notes with op post and top comment
'DEFAULT_REDDIT_FOLDER_NAME': "_reddit"


# I wouldnt change these, personally.
'DEFAULT_NEWLINE_DELIMITER': '|||' # this is for internal use when creating local audit file, like "plans.csv"
'DEFAULT_AUDIT_FILE_ENDING': '.csv' # so that .csv audit files are named accurately 
'DEFAULT_CURRENTNOTE_FILE': 'currentnote.txt'
'DEFAULT_METADATA_ROWS_FILE': 'metadata_rows.txt' # R5: side-channel file written by export_notes_to_markdown's AppleScript loop, one CSV-shaped row per note (title,quoted_title,iso_mod_date). Python reads it after each batch to build the audit CSV without firing a second osascript pass over the same notes. Resolved to an absolute path next to gitmynotes.py at runtime, mirroring DEFAULT_CURRENTNOTE_FILE (B9).



#### GitMyNotes Usage Data
##
##   This data is not transmitted anywhere. 
##   It is used to enable first-time help, when DEFAULT_GITHUB_URL is 0, for example
##   And to help show the benefit you have received using GitMyNotes

# USAGE_FOLDERS_PROCESSED is a mapping of {folder_name: iso_watermark}.
# The watermark is the max modification-date among notes successfully exported in
# the most recent run for that folder ('YYYY-MM-DDTHH:MM:SS' naive local time).
# null means the folder has been seeded (run once via --folder=NAME) but no
# successful run has populated a real watermark yet -- '--auto' mode (R18 feature
# layer) will skip null-watermark folders with a yellow warning. β semantics: each
# new value only replaces the existing watermark if it is strictly greater.

'USAGE_GITMYNOTES_TOTAL': 0
'USAGE_FOLDERS_PROCESSED': {}
'USAGE_NOTES_PROCESSED': 0

